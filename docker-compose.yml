services:
  api:
    container_name: loan-tracker-api
    image: loan-tracker-api:local
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5050
      MONGODB_URI: ${MONGODB_URI:-mongodb://127.0.0.1:27017/loan_tracker}
      REDIS_ENABLED: "true"
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_CACHE_DB: 0
      REDIS_QUEUE_DB: 1
    network_mode: host
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5050/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s